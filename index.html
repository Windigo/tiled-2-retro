<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroMapEditor — AmiBlitz3 Map Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- CUSTOM MENU BAR (inside the window) -->
  <div id="menu-bar">
    <div class="menu-dropdown">
      <button class="menu-title">View</button>
      <div class="menu-dropdown-content">
        <button class="menu-item" data-action="tab-tiled-viewer">Tiled Viewer</button>
        <button class="menu-item" data-action="tab-png-iff">PNG → IFF Converter</button>
      </div>
    </div>
  </div>

  <!-- TOP BAR: Tab switcher -->
  <div id="top-bar">
    <button id="tab-tiled-viewer" class="tab-btn active">Tiled Viewer</button>
    <button id="tab-png-iff" class="tab-btn">PNG → IFF Converter</button>
  </div>

  <!-- ===== TAB 1: TILED VIEWER ===== -->
  <div id="tab-content-tiled-viewer" class="tab-content active">
    <div id="tiled-tab" style="display:flex;flex-direction:column;flex:1;background:#0d1117;">
      <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0;">
        <button id="tiled-browse" style="background:#e94560;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;">Browse…</button>
        <span id="tiled-path" style="font-size:11px;color:#6a7a9a;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">No folder selected</span>
        <button id="tiled-zoom-out" style="background:#0f3460;color:#e0e0e0;border:1px solid #1a508b;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;" title="Zoom out">−</button>
        <span id="tiled-zoom-label" style="font-size:11px;color:#6a7a9a;min-width:50px;text-align:center;">300%</span>
        <button id="tiled-zoom-in" style="background:#0f3460;color:#e0e0e0;border:1px solid #1a508b;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;" title="Zoom in">+</button>
        <span style="border-left:1px solid #1a508b;margin:0 8px;height:24px;"></span>
        <button id="tiled-export-amiga" style="background:#1a508b;color:#e0e0e0;border:1px solid #0f3460;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;" title="Export to Amiga .ab3" disabled>Export Amiga</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0;flex-wrap:wrap;">
        <span id="tiled-filename" style="font-size:11px;color:#e0e0e0;font-weight:600;margin-right:8px;">—</span>
        <span id="tiled-maps" style="display:flex;gap:4px;flex-wrap:wrap;"></span>
      </div>
      <div style="display:flex;flex:1;min-height:0;">
        <!-- Canvas area: takes half of available space -->
        <div id="tiled-canvas-wrap" style="flex:1;overflow:auto;background:#000;margin:8px;border-radius:4px;display:flex;align-items:flex-start;justify-content:center;min-width:0;">
          <canvas id="tiled-canvas" style="display:block;image-rendering:pixelated;"></canvas>
        </div>
        <!-- Layers panel: takes the other half -->
        <div style="flex:1;min-width:220px;padding:8px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;margin:8px 8px 8px 0;border-radius:4px;background:#16213e;border:1px solid #0f3460;">
          <span style="font-size:11px;color:#e94560;font-weight:600;margin-bottom:4px;">Layers</span>
          <span id="tiled-layers" style="display:flex;flex-direction:column;gap:2px;"></span>
          <!-- Tilesheet IFF link (below layers) -->
          <div id="tiled-tilesheet-iff" style="margin-top:8px;padding-top:8px;border-top:1px solid #0f3460;display:none;">
            <span class="iff-hover-trigger" id="tiled-tilesheet-iff-trigger">Tilesheet IFF</span>
            <div class="iff-hover-popup" id="tiled-tilesheet-iff-popup">
              <canvas id="tiled-tilesheet-iff-preview" class="preview-thumb" style="max-width:90vw;height:auto;"></canvas>
            </div>
          </div>
        </div>
      </div>
      <div id="tiled-status" style="font-size:11px;color:#0f0;padding:4px 12px;background:#0d1117;border-top:1px solid #0f3460;flex-shrink:0;min-height:22px;font-family:monospace;"></div>
    </div>
  </div>

  <!-- ===== TAB 2: PNG → IFF CONVERTER ===== -->
  <div id="tab-content-png-iff" class="tab-content">
    <div class="converter-panel">
      <h2 class="panel-title">PNG → IFF Converter</h2>
      <p class="hint">Convert a PNG tilesheet to Amiga IFF/ILBM format with configurable bitplanes and color quantization.</p>
      <div class="converter-form">
        <div class="form-group">
          <label>Source PNG</label>
          <div class="file-picker">
            <button id="btn-pick-png-conv">Select PNG…</button>
            <span id="png-file-name-conv" class="file-name">no file selected</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Bitplanes: <strong id="conv-bp-label">4</strong> (<span id="conv-colors-label">16 colors</span>)</label>
            <input type="range" id="conv-bitplanes" min="1" max="8" value="4" step="1">
          </div>
        </div>
        <div class="converter-preview-row" id="conv-png-preview-row" style="display:none;">
          <div class="form-group">
            <label>PNG Preview</label>
            <canvas id="conv-png-canvas" class="conv-preview-canvas"></canvas>
          </div>
          <div class="form-group">
            <label>IFF Preview (quantized)</label>
            <canvas id="conv-iff-canvas" class="conv-preview-canvas"></canvas>
          </div>
        </div>
        <div id="conv-file-info" class="conv-file-info" style="display:none;">
          <span id="conv-png-dim"></span>
          <span id="conv-iff-size"></span>
          <span id="conv-iff-colors"></span>
        </div>
        <div id="conv-palette" class="conv-palette" style="display:none;">
          <label>Palette (CMAP)</label>
          <div id="conv-palette-swatches" class="conv-palette-swatches"></div>
        </div>
        <div class="modal-footer">
          <button id="btn-convert-iff" class="btn-primary" disabled>Convert & Save IFF</button>
        </div>
      </div>
    </div>
  </div>

  <!-- IFF Bitplanes Settings Modal -->
  <div class="modal-overlay hidden" id="tiled-iff-modal">
    <div class="modal">
      <h2>Tilesheet IFF Settings</h2>
      <div class="modal-body">
        <div class="form-group" style="margin-bottom:4px;">
          <label>Preview Zoom: <strong id="tiled-iff-modal-zoom-label">100%</strong></label>
          <input type="range" id="tiled-iff-modal-zoom" min="25" max="400" value="100" step="25">
        </div>
        <div class="converter-preview-row" id="tiled-iff-modal-preview-row">
          <div class="form-group">
            <label>Original</label>
            <canvas id="tiled-iff-modal-orig-canvas" class="conv-preview-canvas"></canvas>
          </div>
          <div class="form-group">
            <label>IFF Preview (<span id="tiled-iff-modal-colors-label">16 colors</span>)</label>
            <canvas id="tiled-iff-modal-preview-canvas" class="conv-preview-canvas"></canvas>
          </div>
        </div>
        <div class="form-group">
          <label>Bitplanes: <strong id="tiled-iff-modal-bp-label">4</strong> (<span id="tiled-iff-modal-cmap-info">16 colors</span>)</label>
          <input type="range" id="tiled-iff-modal-bitplanes" min="1" max="8" value="4" step="1">
        </div>
        <div id="tiled-iff-modal-palette" class="conv-palette" style="display:block;">
          <label>Palette (CMAP)</label>
          <div id="tiled-iff-modal-palette-swatches" class="conv-palette-swatches"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="tiled-iff-modal-cancel" class="btn-secondary">Cancel</button>
        <button id="tiled-iff-modal-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- TOAST / SNACKBAR -->
  <div id="toast" class="toast hidden"></div>

  <script src="assets/jszip.min.js"></script>
  <script src="renderer.js"></script>
  <script src="tiled-viewer.js"></script>
</body>
</html>
