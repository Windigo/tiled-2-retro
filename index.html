<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroMapEditor — AmiBlitz3 Map Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- CUSTOM MENU BAR (inside the window) -->
  <div id="menu-bar">
    <div class="menu-dropdown">
      <button class="menu-title">File</button>
      <div class="menu-dropdown-content">
        <button class="menu-item" data-action="new">New Project</button>
        <button class="menu-item" data-action="load">Load Project</button>
        <button class="menu-item" data-action="save">Save Project</button>
        <button class="menu-item" data-action="settings">Project Settings</button>
        <hr class="menu-separator">
        <button class="menu-item" data-action="export">Export Amiga</button>
        <button class="menu-item" data-action="preview">Preview Export</button>
      </div>
    </div>
    <div class="menu-dropdown">
      <button class="menu-title">View</button>
      <div class="menu-dropdown-content">
        <button class="menu-item" data-action="tab-tiled-viewer">Tiled Viewer</button>
        <button class="menu-item" data-action="tab-png-iff">PNG → IFF Converter</button>
      </div>
    </div>
  </div>

  <!-- TOP BAR: Tab switcher -->
  <div id="top-bar">
    <button id="tab-tiled-viewer" class="tab-btn active">Tiled Viewer</button>
    <button id="tab-png-iff" class="tab-btn">PNG → IFF Converter</button>
    <span id="project-name" class="project-name clickable" title="Click to rename project">— no project —</span>
    <input id="project-name-input" class="project-name-input hidden" type="text">
  </div>

  <!-- ===== HIDDEN: Level editor DOM elements (kept to satisfy renderer.ts lookups) ===== -->
  <div style="display:none;" aria-hidden="true">
    <div id="tab-content-level-editor">
      <canvas id="map-canvas"></canvas>
      <canvas id="tiles-canvas"></canvas>
      <span id="active-tile-id"></span>
      <div id="flags-column"></div>
      <input type="checkbox" id="chk-bits-on-map">
      <input type="range" id="tile-size-slider">
      <span id="tile-size-value"></span>
      <div id="map-tabs"></div>
      <span id="map-dims"></span>
      <span id="tilesheet-dims"></span>
      <div id="new-project-overlay" class="hidden"><div id="new-project-title"></div><button id="btn-modal-create"></button><button id="btn-modal-save-settings" class="hidden"></button></div>
      <div id="rename-map-overlay" class="hidden"><input id="input-rename-map"><span id="rename-map-label"></span></div>
      <div id="delete-map-overlay" class="hidden"><span id="delete-map-message"></span></div>
      <div id="file-browser-overlay" class="hidden"><span id="fb-current-path"></span><div id="fb-list"></div><button id="btn-fb-open"></button></div>
      <div id="amiga-preview-overlay" class="hidden"><span id="iff-info"></span><span id="map-info"></span><canvas id="iff-preview-canvas"></canvas><textarea id="ab3-preview"></textarea><textarea id="ab3-bin-preview"></textarea><textarea id="ab3-player-preview"></textarea></div>
      <!-- modal elements -->
      <button id="btn-pick-folder"></button>
      <button id="btn-pick-png"></button>
      <span id="folder-path"></span>
      <span id="png-file-name"></span>
      <input type="text" id="input-project-name">
      <input type="text" id="input-map-name">
      <input type="range" id="modal-bitplanes">
      <span id="modal-bp-label"></span>
      <span id="modal-colors-label"></span>
      <div id="modal-iff-preview-row">
        <canvas id="modal-png-preview-canvas"></canvas>
        <canvas id="modal-iff-preview-canvas"></canvas>
      </div>
      <button id="btn-modal-cancel"></button>
      <button id="btn-rename-cancel"></button>
      <button id="btn-rename-confirm"></button>
      <button id="btn-delete-cancel"></button>
      <button id="btn-delete-confirm"></button>
      <button id="btn-fb-cancel"></button>
      <button id="btn-preview-cancel"></button>
      <button id="btn-preview-export"></button>
      <button id="btn-modal-save-settings"></button>
      <!-- Hidden tab-level-editor button -->
      <button id="tab-level-editor"></button>
    </div>
  </div>

  <!-- ===== TAB 1: TILED VIEWER ===== -->
  <div id="tab-content-tiled-viewer" class="tab-content active">
    <div id="tiled-tab" style="display:flex;flex-direction:column;height:100%;background:#0d1117;">
      <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0;">
        <button id="tiled-browse" style="background:#e94560;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;">Browse…</button>
        <span id="tiled-path" style="font-size:11px;color:#6a7a9a;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">No folder selected</span>
        <button id="tiled-zoom-out" style="background:#0f3460;color:#e0e0e0;border:1px solid #1a508b;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;" title="Zoom out">−</button>
        <span id="tiled-zoom-label" style="font-size:11px;color:#6a7a9a;min-width:50px;text-align:center;">300%</span>
        <button id="tiled-zoom-in" style="background:#0f3460;color:#e0e0e0;border:1px solid #1a508b;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;" title="Zoom in">+</button>
        <span style="border-left:1px solid #1a508b;margin:0 8px;height:24px;"></span>
        <button id="tiled-export-amiga" style="background:#1a508b;color:#e0e0e0;border:1px solid #0f3460;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;" title="Export to Amiga .ab3" disabled>Export Amiga</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0;flex-wrap:wrap;">
        <span id="tiled-filename" style="font-size:11px;color:#e0e0e0;font-weight:600;margin-right:8px;">—</span>
        <span id="tiled-maps" style="display:flex;gap:4px;flex-wrap:wrap;"></span>
      </div>
      <div style="display:flex;flex:1;min-height:0;">
        <!-- Canvas area -->
        <div id="tiled-canvas-wrap" style="flex:1;overflow:auto;background:#000;margin:8px;border-radius:4px;">
          <canvas id="tiled-canvas" style="display:block;image-rendering:pixelated;"></canvas>
        </div>
        <!-- Layers panel (right side, vertical) -->
        <div style="background:#16213e;min-width:180px;max-width:220px;padding:8px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;flex-shrink:0;margin:8px 8px 8px 0;border-radius:4px;border:1px solid #0f3460;">
          <span style="font-size:11px;color:#e94560;font-weight:600;margin-bottom:4px;">Layers</span>
          <span id="tiled-layers" style="display:flex;flex-direction:column;gap:2px;"></span>
        </div>
      </div>
      <div id="tiled-status" style="font-size:11px;color:#0f0;padding:4px 12px;background:#0d1117;border-top:1px solid #0f3460;flex-shrink:0;min-height:22px;font-family:monospace;"></div>
    </div>
  </div>

  <!-- ===== TAB 2: PNG → IFF CONVERTER ===== -->
  <div id="tab-content-png-iff" class="tab-content">
    <div class="converter-panel">
      <h2 class="panel-title">PNG → IFF Converter</h2>
      <p class="hint">Convert a 1‑bit (monochrome) PNG tilesheet to Amiga IFF/ILBM format with 1 bitplane.</p>

      <div class="converter-form">
        <div class="form-group">
          <label>Source PNG</label>
          <div class="file-picker">
            <button id="btn-pick-png-conv">Select PNG…</button>
            <span id="png-file-name-conv" class="file-name">no file selected</span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Bitplanes: <strong id="conv-bp-label">4</strong> (<span id="conv-colors-label">16 colors</span>)</label>
            <input type="range" id="conv-bitplanes" min="1" max="8" value="4" step="1">
          </div>
        </div>

        <div class="converter-preview-row" id="conv-png-preview-row" style="display:none;">
          <div class="form-group">
            <label>PNG Preview</label>
            <canvas id="conv-png-canvas" class="conv-preview-canvas"></canvas>
          </div>
          <div class="form-group">
            <label>IFF Preview (quantized)</label>
            <canvas id="conv-iff-canvas" class="conv-preview-canvas"></canvas>
          </div>
        </div>

        <div id="conv-file-info" class="conv-file-info" style="display:none;">
          <span id="conv-png-dim"></span>
          <span id="conv-iff-size"></span>
          <span id="conv-iff-colors"></span>
        </div>

        <div id="conv-palette" class="conv-palette" style="display:none;">
          <label>Palette (CMAP)</label>
          <div id="conv-palette-swatches" class="conv-palette-swatches"></div>
        </div>

        <div class="modal-footer">
          <button id="btn-convert-iff" class="btn-primary" disabled>Convert & Save IFF</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST / SNACKBAR -->
  <div id="toast" class="toast hidden"></div>

  <script src="assets/jszip.min.js"></script>
  <script src="renderer.js"></script>
  <script type="importmap">
    {
      "imports": {
        "lit": "./node_modules/lit/index.js",
        "lit/": "./node_modules/lit/",
        "@lit/reactive-element": "./node_modules/@lit/reactive-element/reactive-element.js",
        "lit-element/lit-element.js": "./node_modules/lit-element/lit-element.js",
        "lit-html": "./node_modules/lit-html/lit-html.js",
        "lit-html/": "./node_modules/lit-html/"
      }
    }
  </script>
  <script type="module" src="tiled-viewer.js"></script>
</body>
</html>
